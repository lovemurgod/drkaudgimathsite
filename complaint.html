<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Submit a complaint to help us improve hospital services." />
  <title>Submit Complaint | Dr. R. G. Karudagimath Memorial Nursing Home</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="complaint-page">
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <header class="site-header" aria-label="Main header">
    <div class="container site-header__inner">
      <a class="brand" href="index.html" aria-label="Dr. R. G. Karudagimath Memorial Nursing Home home">
        <img src="Assets/images/Logo.png" alt="Dr. R. G. Karudagimath Memorial Nursing Home logo" class="brand__logo" />
        <span class="brand__name">Dr. R. G. Karudagimath Memorial Nursing Home</span>
      </a>

      <nav class="primary-nav" aria-label="Primary navigation">
        <ul class="primary-nav__list">
          <li><a href="index.html">Home</a></li>
          <li><a href="tel:+919740978768" class="button button--small button--emergency" aria-label="Call ambulance now">Call Ambulance Now</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main id="main-content">
    <section class="appointment-section" aria-labelledby="complaint-title">
      <div class="container">
        <div class="appointment-card">
          <h1 id="complaint-title">Submit a Complaint</h1>
          <p class="appointment-intro">Your feedback helps hospital management improve patient care. Personal details are optional.</p>

          <form id="complaint-form" novalidate>
            <div class="appointment-form__field">
              <label for="reporter_name">Name (Optional)</label>
              <input type="text" id="reporter_name" name="reporter_name" autocomplete="name" />
            </div>

            <div class="appointment-form__field">
              <label for="reporter_phone">Phone (Optional)</label>
              <input type="tel" id="reporter_phone" name="reporter_phone" autocomplete="tel" />
            </div>

            <div class="appointment-form__field">
              <label for="reporter_email">Email (Optional)</label>
              <input type="email" id="reporter_email" name="reporter_email" autocomplete="email" />
            </div>

            <div class="appointment-form__field appointment-form__field--half">
              <label for="incident_date">Incident Occurred Date *</label>
              <input type="date" id="incident_date" name="incident_date" required />
            </div>

            <div class="appointment-form__field appointment-form__field--half">
              <label for="incident_time">Incident Occurred Time *</label>
              <input type="time" id="incident_time" name="incident_time" required />
            </div>

            <div class="appointment-form__field">
              <label for="incident_nature">Nature of Incident *</label>
              <select id="incident_nature" name="incident_nature" required>
                <option value="">Select complaint category</option>
                <option value="Service Delay">Service Delay</option>
                <option value="Staff Behaviour">Staff Behaviour</option>
                <option value="Clinical Concern">Clinical Concern</option>
                <option value="Cleanliness & Hygiene">Cleanliness & Hygiene</option>
                <option value="Billing Issue">Billing Issue</option>
                <option value="Facilities Issue">Facilities Issue</option>
                <option value="Other">Other</option>
              </select>
            </div>

            <div class="appointment-form__field">
              <label for="incident_details">Complaint Details *</label>
              <textarea id="incident_details" name="incident_details" rows="5" required placeholder="Please describe what happened, where it happened, and who was involved."></textarea>
            </div>

            <div class="appointment-form__actions">
              <button type="submit" class="button button--primary">Submit Complaint</button>
            </div>

            <p id="complaint-form-message" class="appointment-form__message" role="status" aria-live="polite"></p>
          </form>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container site-footer__inner">
      <img src="Assets/images/Logo.png" alt="Dr. R. G. Karudagimath Memorial Nursing Home footer logo" class="site-footer__logo" />
      <p>Dr. R. G. Karudagimath Memorial Nursing Home, Badami</p>
      <p>&copy; <span>2026</span> All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="supabaseClient.js" defer></script>
  <script src="complaints.js" defer></script>
</body>
</html>
