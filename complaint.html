<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Submit a complaint to help us improve hospital services." />
  <title>Submit Complaint | Dr. R. G. Karudagimath Memorial Nursing Home</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="complaint-page">
  <a class="skip-link" href="#main-content" data-i18n="common.skipToMain">Skip to main content</a>

  <header class="site-header" aria-label="Main header" data-i18n-attr="aria-label:common.mainHeaderAria">
    <div class="container site-header__inner">
      <a class="brand" href="index.html" aria-label="Dr. R. G. Karudagimath Memorial Nursing Home home" data-i18n-attr="aria-label:common.brandHomeAria">
        <img src="Assets/images/Logo.png" alt="Dr. R. G. Karudagimath Memorial Nursing Home logo" class="brand__logo" data-i18n-attr="alt:common.logoAlt" />
        <span class="brand__name" data-i18n="common.brandName">Dr. R. G. Karudagimath Memorial Nursing Home</span>
      </a>

      <nav class="primary-nav" aria-label="Primary navigation" data-i18n-attr="aria-label:common.primaryNavigationAria">
        <ul class="primary-nav__list">
          <li><a href="index.html" data-i18n="common.home">Home</a></li>
          <li class="language-control">
            <label class="language-control__label" data-language-label for="language-selector-complaint">Language:</label>
            <select id="language-selector-complaint" class="language-control__select" data-language-selector aria-label="Language selector" data-i18n-attr="aria-label:common.languageSelectorAria">
              <option value="en">English</option>
              <option value="hi">Hindi</option>
              <option value="kn">Kannada</option>
            </select>
          </li>
          <li><a href="tel:+919740978768" class="button button--small button--emergency" aria-label="Call ambulance now" data-i18n="nav.callAmbulanceNow" data-i18n-attr="aria-label:common.callAmbulanceAria">Call Ambulance Now</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main id="main-content">
    <section class="appointment-section" aria-labelledby="complaint-title">
      <div class="container">
        <div class="appointment-card">
          <h1 id="complaint-title" data-i18n="complaint.pageTitle">Submit a Complaint</h1>
          <p class="appointment-intro" data-i18n="complaint.pageIntro">Your feedback helps hospital management improve patient care. Personal details are optional.</p>

          <form id="complaint-form" novalidate>
            <div class="appointment-form__field">
              <label for="reporter_name" data-i18n="complaint.field.name">Name (Optional)</label>
              <input type="text" id="reporter_name" name="reporter_name" autocomplete="name" />
            </div>

            <div class="appointment-form__field">
              <label for="reporter_phone" data-i18n="complaint.field.phone">Phone (Optional)</label>
              <input type="tel" id="reporter_phone" name="reporter_phone" autocomplete="tel" />
            </div>

            <div class="appointment-form__field">
              <label for="reporter_email" data-i18n="complaint.field.email">Email (Optional)</label>
              <input type="email" id="reporter_email" name="reporter_email" autocomplete="email" />
            </div>

            <div class="appointment-form__field appointment-form__field--half">
              <label for="incident_date" data-i18n="complaint.field.incidentDate">Incident Occurred Date *</label>
              <input type="date" id="incident_date" name="incident_date" required />
            </div>

            <div class="appointment-form__field appointment-form__field--half">
              <label for="incident_time" data-i18n="complaint.field.incidentTime">Incident Occurred Time *</label>
              <input type="time" id="incident_time" name="incident_time" required />
            </div>

            <div class="appointment-form__field">
              <label for="incident_nature" data-i18n="complaint.field.incidentNature">Nature of Incident *</label>
              <select id="incident_nature" name="incident_nature" required>
                <option value="" data-i18n="complaint.category.select">Select complaint category</option>
                <option value="Service Delay" data-i18n="complaint.category.serviceDelay">Service Delay</option>
                <option value="Staff Behaviour" data-i18n="complaint.category.staffBehaviour">Staff Behaviour</option>
                <option value="Clinical Concern" data-i18n="complaint.category.clinicalConcern">Clinical Concern</option>
                <option value="Cleanliness & Hygiene" data-i18n="complaint.category.cleanliness">Cleanliness & Hygiene</option>
                <option value="Billing Issue" data-i18n="complaint.category.billing">Billing Issue</option>
                <option value="Facilities Issue" data-i18n="complaint.category.facilities">Facilities Issue</option>
                <option value="Other" data-i18n="complaint.category.other">Other</option>
              </select>
            </div>

            <div class="appointment-form__field">
              <label for="incident_details" data-i18n="complaint.field.details">Complaint Details *</label>
              <textarea id="incident_details" name="incident_details" rows="5" required placeholder="Please describe what happened, where it happened, and who was involved." data-i18n-attr="placeholder:complaint.detailsPlaceholder"></textarea>
            </div>

            <div class="appointment-form__actions">
              <button type="submit" class="button button--primary" data-i18n="complaint.submit">Submit Complaint</button>
            </div>

            <p id="complaint-form-message" class="appointment-form__message" role="status" aria-live="polite"></p>
          </form>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container site-footer__inner">
      <img src="Assets/images/Logo.png" alt="Dr. R. G. Karudagimath Memorial Nursing Home footer logo" class="site-footer__logo" data-i18n-attr="alt:common.footerLogoAlt" />
      <p data-i18n="common.hospitalNameBadami">Dr. R. G. Karudagimath Memorial Nursing Home, Badami</p>
      <p>&copy; <span>2026</span> <span data-i18n="common.allRightsReserved">All rights reserved.</span></p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="i18n.js" defer></script>
  <script src="supabaseClient.js" defer></script>
  <script src="complaints.js" defer></script>
</body>
</html>
